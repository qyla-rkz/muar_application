name: muar_tourism_guide
description: A Tourism Guide System Application at Muar Town

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  google_maps_flutter: ^2.6.0
  image_picker: ^1.0.7
  table_calendar: ^3.1.3
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_localizations:
    sdk: flutter

  # UI + Utils
  cupertino_icons: ^1.0.6
  intl: ^0.20.2
  flutter_svg: ^2.0.10
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0
  http: ^1.2.0
  google_fonts: ^7.0.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.4
  geolocator: ^13.0.0
  flutter_dotenv: ^6.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/muar_flag.png
    - assets/icon.png

